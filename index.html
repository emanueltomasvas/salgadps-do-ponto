<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salgados do Ponto — Pedidos</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #C8191A; --yellow: #F9D800; --yellow-light: #fffbe0;
    --white: #ffffff; --gray-100: #f4f4f4; --gray-200: #e8e8e8;
    --gray-400: #aaa; --gray-600: #666; --gray-900: #1a1a1a;
    --radius-md: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Nunito Sans', sans-serif; background: #ddd; display: flex; justify-content: center; }
  .app { width: 100%; max-width: 480px; min-height: 100vh; background: var(--white); display: flex; flex-direction: column; position: relative; }
  .screen { display: none; flex-direction: column; flex: 1; }
  .screen.active { display: flex; }
  .header { background: var(--red); padding: 18px 20px; color: var(--yellow); flex-shrink: 0; }
  .body { flex: 1; overflow-y: auto; padding: 16px; }
  .nav { background: var(--red); display: flex; justify-content: space-around; padding: 12px 0; flex-shrink: 0; }
  .nav-item { color: rgba(249,216,0,0.5); font-weight: 700; font-size: 11px; cursor: pointer; text-align: center; }
  .nav-item.active { color: var(--yellow); }
  .btn { width: 100%; border: none; border-radius: var(--radius-md); padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: 'Nunito'; }
  .btn-primary { background: var(--red); color: var(--yellow); }
  .btn-secondary { background: var(--gray-100); color: var(--red); border: 1px solid var(--gray-200); }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 11px; font-weight: 800; color: var(--gray-600); margin-bottom: 4px; text-transform: uppercase; }
  .field input, .field select, .field textarea { width: 100%; border: 1.5px solid var(--gray-200); border-radius: 8px; padding: 12px; font-size: 14px; font-family: inherit; }
  
  .cat-group { margin-bottom: 25px; }
  .cat-title { background: #f8f8f8; padding: 6px 12px; border-radius: 6px; font-size: 13px; font-weight: 800; color: var(--red); margin-bottom: 10px; border-left: 4px solid var(--red); }
  .product-item { padding: 12px 0; border-bottom: 1px solid #eee; position: relative; }
  .flavor-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; background: #fafafa; border-radius: 6px; margin-top: 5px; font-size: 13px; }
  .qty-btn { width: 28px; height: 28px; border-radius: 50%; border: none; background: #eee; font-weight: bold; cursor: pointer; }
  .qty-btn.plus { background: var(--red); color: white; }

  .menu-dots { cursor: pointer; padding: 5px 10px; font-size: 20px; color: var(--gray-400); }
  .dropdown { display: none; position: absolute; right: 0; top: 40px; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.15); border-radius: 8px; z-index: 10; width: 120px; }
  .dropdown.active { display: block; }
  .dropdown-item { padding: 12px; font-size: 13px; font-weight: 600; cursor: pointer; border-bottom: 1px solid #f4f4f4; color: red; }
  
  .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 8px 16px; border-radius: 20px; font-size: 12px; opacity: 0; transition: 0.3s; z-index: 999; }
  .toast.show { opacity: 1; }
</style>
</head>
<body onclick="window.closeAllDropdowns()">
<div class="app">

  <div class="screen active" id="screen-login">
    <div style="background: var(--red); padding: 50px 20px; text-align: center;"><h1 style="color:var(--yellow); font-family:'Nunito'; font-weight:900;">Salgados do Ponto.</h1></div>
    <div class="body">
      <div class="field"><label>Nome</label><input type="text" id="login-name"></div>
      <div class="field"><label>Data</label><input type="date" id="login-date"></div>
      <button class="btn btn-primary" onclick="window.doLogin()">Entrar</button>
    </div>
  </div>

  <div class="screen" id="screen-order">
    <div class="header"><div id="order-info" style="font-weight:800;"></div></div>
    <div class="body">
      <div id="order-tabs" style="display:flex; gap:8px; overflow-x:auto; padding-bottom:12px;"></div>
      <div id="order-products"></div>
      <div class="field" style="margin-top:20px;">
        <label>Observação</label>
        <textarea id="order-obs" rows="2" placeholder="Ex: Adicionar molho extra..."></textarea>
      </div>
    </div>
    <div style="padding:15px;"><button class="btn btn-primary" onclick="window.navigate('review')">Revisar Pedido</button></div>
    <div class="nav">
      <div class="nav-item active" onclick="window.navigate('order')">PEDIDO</div>
      <div class="nav-item" onclick="window.navigate('catalog')">PRODUTOS</div>
    </div>
  </div>

  <div class="screen" id="screen-catalog">
    <div class="header" style="display:flex; justify-content:space-between; align-items:center;">
        <b>Produtos & Categorias</b>
        <button onclick="window.addCategory()" style="background:var(--yellow); border:none; padding:5px 10px; border-radius:5px; font-weight:800; font-size:10px;">+ CATEGORIA</button>
    </div>
    <div class="body">
      <div style="background:var(--yellow-light); padding:15px; border-radius:12px; margin-bottom:20px; border:1px solid var(--yellow);">
        <div class="field"><label>Novo Produto</label><input type="text" id="new-name" placeholder="Nome"></div>
        <div style="display:flex; gap:10px;">
          <div class="field" style="flex:1;"><label>Cat.</label><select id="new-cat"></select></div>
          <div class="field" style="flex:1;"><label>Unid.</label><select id="new-unit"><option>unidade</option><option>caixa</option><option>fardo</option><option>pacote</option></select></div>
        </div>
        <button class="btn btn-primary" onclick="window.addProduct()">Adicionar</button>
      </div>
      <div id="catalog-grouped"></div>
    </div>
    <div class="nav"><div class="nav-item" onclick="window.navigate('order')">PEDIDO</div><div class="nav-item active" onclick="window.navigate('catalog')">PRODUTOS</div></div>
  </div>

  <div class="screen" id="screen-review">
    <div class="header"><b>Resumo</b></div>
    <div class="body" id="review-body"></div>
    <div style="padding:15px; display:flex; gap:10px;"><button class="btn btn-secondary" onclick="window.navigate('order')">Voltar</button><button class="btn btn-primary" onclick="window.generateOrder()">Finalizar</button></div>
  </div>

  <div class="screen" id="screen-result">
    <div class="header"><b>Mensagem</b></div>
    <div class="body">
      <div id="result-message" style="background:#f4f4f4; padding:15px; border-radius:10px; white-space:pre-wrap; font-family:monospace; margin-bottom:15px; font-size:13px;"></div>
      <button class="btn btn-primary" onclick="window.copyMessage()">Copiar WhatsApp</button>
      <button class="btn btn-secondary" style="margin-top:10px;" onclick="window.newOrder()">Novo Pedido</button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script type="module">
// LISTA FIXA DE CATEGORIAS E PRODUTOS (SEM DEPENDER DO AUTO-SETUP)
const CATEGORIES = ["BOLOS E SOBREMESAS", "SALGADOS FRITOS", "SALGADOS DE FORNO", "BEBIDAS", "SUCOS", "EMBALAGENS E DESCARTÁVEIS", "MOLHOS E COMPLEMENTOS", "INSUMOS"];

const INITIAL_PRODUCTS = [
  { id: "p1", cat: "BOLOS E SOBREMESAS", name: "Torta 15 pessoas", unit: "unidade", flavors: ["Ninho", "Brigadeiro"] },
  { id: "p2", cat: "BOLOS E SOBREMESAS", name: "Torta 25 pessoas", unit: "unidade", flavors: ["Ninho", "Brigadeiro"] },
  { id: "p3", cat: "BOLOS E SOBREMESAS", name: "Bolo de pote", unit: "unidade", flavors: ["Ninho", "Brigadeiro", "Red Velvet"] },
  { id: "p4", cat: "BOLOS E SOBREMESAS", name: "Bolo caseiro", unit: "unidade", flavors: ["Tradicional"] },
  { id: "p5", cat: "BOLOS E SOBREMESAS", name: "Bolo mole", unit: "unidade", flavors: ["Tradicional"] },
  { id: "p6", cat: "BOLOS E SOBREMESAS", name: "Bolo amanteigado", unit: "unidade", flavors: ["Tradicional"] },
  { id: "p7", cat: "BOLOS E SOBREMESAS", name: "Pudim", unit: "unidade", flavors: ["Tradicional"] },
  { id: "p8", cat: "BOLOS E SOBREMESAS", name: "Mini pudim", unit: "unidade", flavors: ["Tradicional"] },
  { id: "p9", cat: "SALGADOS FRITOS", name: "Coxinha", unit: "caixa", flavors: ["Frango"] },
  { id: "p10", cat: "SALGADOS FRITOS", name: "Mini coxinha", unit: "caixa", flavors: ["Frango"] },
  { id: "p11", cat: "SALGADOS FRITOS", name: "Enroladinho de salsicha", unit: "caixa", flavors: ["Salsicha"] },
  { id: "p12", cat: "SALGADOS FRITOS", name: "Bolinha de queijo", unit: "caixa", flavors: ["Queijo"] },
  { id: "p13", cat: "SALGADOS FRITOS", name: "Salgado de queijo médio", unit: "unidade", flavors: ["Queijo"] },
  { id: "p14", cat: "SALGADOS FRITOS", name: "Salgado de carne médio", unit: "unidade", flavors: ["Carne"] },
  { id: "p15", cat: "SALGADOS DE FORNO", name: "Salgado forno", unit: "caixa", flavors: ["Frango", "Misto", "Mistão"] },
  { id: "p16", cat: "SALGADOS DE FORNO", name: "Empadão", unit: "unidade", flavors: ["Frango"] },
  { id: "p17", cat: "SALGADOS DE FORNO", name: "Empada média", unit: "unidade", flavors: ["Frango"] },
  { id: "p18", cat: "SALGADOS DE FORNO", name: "Empada pequena", unit: "unidade", flavors: ["Frango"] },
  { id: "p19", cat: "SALGADOS DE FORNO", name: "Mini empada", unit: "unidade", flavors: ["Frango"] },
  { id: "p20", cat: "BEBIDAS", name: "Cajuína", unit: "fardo", flavors: ["Tradicional"] },
  { id: "p21", cat: "BEBIDAS", name: "Coca lata", unit: "fardo", flavors: ["Normal", "Zero"] },
  { id: "p22", cat: "BEBIDAS", name: "Kuat", unit: "fardo", flavors: ["Tradicional"] },
  { id: "p23", cat: "BEBIDAS", name: "Água com gás", unit: "fardo", flavors: ["Tradicional"] },
  { id: "p24", cat: "BEBIDAS", name: "Coca 600ml", unit: "fardo", flavors: ["Zero"] },
  { id: "p25", cat: "SUCOS", name: "Suco", unit: "balde", flavors: ["Acerola", "Goiaba", "Manga", "Caju"] },
  { id: "p26", cat: "EMBALAGENS E DESCARTÁVEIS", name: "Guardanapo", unit: "pacote" },
  { id: "p27", cat: "EMBALAGENS E DESCARTÁVEIS", name: "Colher pequena", unit: "pacote" },
  { id: "p28", cat: "EMBALAGENS E DESCARTÁVEIS", name: "Copo 400ml", unit: "pacote" },
  { id: "p29", cat: "EMBALAGENS E DESCARTÁVEIS", name: "Copo 500ml", unit: "pacote" },
  { id: "p30", cat: "EMBALAGENS E DESCARTÁVEIS", name: "Sacola branca PP", unit: "unidade" },
  { id: "p31", cat: "EMBALAGENS E DESCARTÁVEIS", name: "Sacola branca P", unit: "unidade" },
  { id: "p32", cat: "EMBALAGENS E DESCARTÁVEIS", name: "Sacola branca G", unit: "unidade" },
  { id: "p33", cat: "EMBALAGENS E DESCARTÁVEIS", name: "Sacola de papel para salgados", unit: "unidade" },
  { id: "p34", cat: "EMBALAGENS E DESCARTÁVEIS", name: "Embalagem para bolo", unit: "unidade" },
  { id: "p35", cat: "EMBALAGENS E DESCARTÁVEIS", name: "Caixa para cento de salgados", unit: "unidade" },
  { id: "p36", cat: "MOLHOS E COMPLEMENTOS", name: "Ketchup", unit: "unidade" },
  { id: "p37", cat: "MOLHOS E COMPLEMENTOS", name: "Sachê ketchup", unit: "unidade" },
  { id: "p38", cat: "MOLHOS E COMPLEMENTOS", name: "Sachê maionese", unit: "unidade" },
  { id: "p39", cat: "MOLHOS E COMPLEMENTOS", name: "Molho de pimenta", unit: "unidade" },
  { id: "p40", cat: "MOLHOS E COMPLEMENTOS", name: "Palito de dente", unit: "pacote" },
  { id: "p41", cat: "INSUMOS", name: "Óleo", unit: "unidade" }
];

let products = [...INITIAL_PRODUCTS], categories = [...CATEGORIES], quantities = {}, user = '', date = '', activeCat = CATEGORIES[0];

// --- LOGICA DE NAVEGAÇÃO ---
window.doLogin = () => {
  user = document.getElementById('login-name').value;
  date = document.getElementById('login-date').value;
  if(!user || !date) return alert("Preencha nome e data.");
  window.navigate('order');
};

window.navigate = (s) => {
  document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
  document.getElementById('screen-'+s).classList.add('active');
  if(s==='order') renderOrder();
  if(s==='catalog') renderCatalog();
  if(s==='review') renderReview();
};

window.chg = (pId, flavor, v) => {
  const key = flavor ? `${pId}_${flavor}` : pId;
  const n = (quantities[key] || 0) + v;
  if(n <= 0) delete quantities[key]; else quantities[key] = n;
  renderProducts();
};

window.addProduct = () => {
  const name = document.getElementById('new-name').value;
  const cat = document.getElementById('new-cat').value;
  const unit = document.getElementById('new-unit').value;
  if(!name) return;
  products.push({ id: 'custom_'+Date.now(), name, cat, unit });
  document.getElementById('new-name').value = '';
  renderCatalog();
  showToast("Adicionado!");
};

window.addCategory = () => {
    const n = prompt("Nome da categoria:");
    if(n) { categories.push(n); renderCatalog(); renderOrder(); }
};

window.toggleMenu = (e, id) => {
    e.stopPropagation();
    document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('active'));
    document.getElementById('drop-'+id)?.classList.toggle('active');
};

window.closeAllDropdowns = () => document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('active'));

window.delProduct = (id) => {
    products = products.filter(p => p.id !== id);
    renderCatalog();
};

window.generateOrder = () => {
  const obs = document.getElementById('order-obs').value;
  let msg = `*PEDIDO SALGADOS DO PONTO*\n👤 ${user}\n📅 ${date.split('-').reverse().join('/')}\n`;
  categories.forEach(c => {
      let catText = "";
      products.filter(p => p.cat === c).forEach(p => {
          if(p.flavors) {
              p.flavors.forEach(f => {
                  if(quantities[`${p.id}_${f}`]) catText += `• ${p.name} (${f}): ${quantities[`${p.id}_${f}`]} ${p.unit}\n`;
              });
          } else if(quantities[p.id]) catText += `• ${p.name}: ${quantities[p.id]} ${p.unit}\n`;
      });
      if(catText) msg += `\n🔹 *${c}*\n${catText}`;
  });
  if(obs) msg += `\n📝 *OBS:* ${obs}`;
  document.getElementById('result-message').textContent = msg;
  window.navigate('result');
};

window.copyMessage = () => {
    navigator.clipboard.writeText(document.getElementById('result-message').textContent);
    showToast("Pedido Copiado!");
};

window.newOrder = () => { quantities = {}; window.navigate('order'); };

// --- RENDERS ---
function renderOrder() {
  document.getElementById('order-info').textContent = `${user} • ${date.split('-').reverse().join('/')}`;
  document.getElementById('order-tabs').innerHTML = categories.map(c => `<button onclick="window.activeCat='${c}'; renderOrder()" style="padding:8px 15px; border-radius:20px; border:1px solid #ddd; background:${activeCat===c?'var(--red)':'#fff'}; color:${activeCat===c?'#fff':'#666'}; font-weight:700; white-space:nowrap; margin-right:5px;">${c}</button>`).join('');
  renderProducts();
}

function renderProducts() {
  const cont = document.getElementById('order-products');
  cont.innerHTML = products.filter(p => p.cat === activeCat).map(p => {
      if(p.flavors) {
          return `<div class="product-item"><b>${p.name}</b> ${p.flavors.map(f => `<div class="flavor-row"><span>${f}</span><div style="display:flex;align-items:center;gap:10px;"><button class="qty-btn" onclick="window.chg('${p.id}','${f}',-1)">-</button><b>${quantities[`${p.id}_${f}`]||0}</b><button class="qty-btn plus" onclick="window.chg('${p.id}','${f}',1)">+</button></div></div>`).join('')}</div>`;
      }
      return `<div class="product-item"><div style="display:flex;justify-content:space-between;align-items:center;"><div><b>${p.name}</b><br><small>${p.unit}</small></div><div style="display:flex;align-items:center;gap:12px;"><button class="qty-btn" onclick="window.chg('${p.id}',null,-1)">-</button><b>${quantities[p.id]||0}</b><button class="qty-btn plus" onclick="window.chg('${p.id}',null,1)">+</button></div></div></div>`;
  }).join('');
}

function renderCatalog() {
    const cont = document.getElementById('catalog-grouped');
    const select = document.getElementById('new-cat');
    select.innerHTML = categories.map(c => `<option value="${c}">${c}</option>`).join('');
    cont.innerHTML = categories.map(c => `<div class="cat-group"><div class="cat-title">${c}</div>${products.filter(p => p.cat === c).map(p => `<div class="product-item"><div style="display:flex;justify-content:space-between;align-items:center;"><b>${p.name}</b><div class="menu-dots" onclick="window.toggleMenu(event,'${p.id}')">⋮<div class="dropdown" id="drop-${p.id}"><div class="dropdown-item" onclick="window.delProduct('${p.id}')">Excluir</div></div></div></div></div>`).join('')}</div>`).join('');
}

function renderReview() {
    let h = '';
    categories.forEach(c => {
        let catH = "";
        products.filter(p => p.cat === c).forEach(p => {
            if(p.flavors) p.flavors.forEach(f => { if(quantities[`${p.id}_${f}`]) catH += `<div>${p.name} (${f}): ${quantities[`${p.id}_${f}`]}</div>`; });
            else if(quantities[p.id]) catH += `<div>${p.name}: ${quantities[p.id]}</div>`;
        });
        if(catH) h += `<div style="margin-top:10px"><b>${c}</b>${catH}</div>`;
    });
    document.getElementById('review-body').innerHTML = h || 'Vazio';
}

function showToast(m) { const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }

document.getElementById('login-date').value = new Date().toISOString().split('T')[0];
renderCatalog();
</script>
</body>
</html>
