<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salgados do Ponto — Pedidos</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #C8191A; --yellow: #F9D800; --yellow-light: #fffbe0;
    --white: #ffffff; --gray-100: #f4f4f4; --gray-200: #e8e8e8;
    --gray-400: #aaa; --gray-600: #666; --gray-900: #1a1a1a;
    --radius-md: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Nunito Sans', sans-serif; background: #ddd; display: flex; justify-content: center; }
  .app { width: 100%; max-width: 480px; min-height: 100vh; background: var(--white); display: flex; flex-direction: column; position: relative; }
  .screen { display: none; flex-direction: column; flex: 1; }
  .screen.active { display: flex; }
  .header { background: var(--red); padding: 18px 20px; color: var(--yellow); flex-shrink: 0; }
  .body { flex: 1; overflow-y: auto; padding: 16px; }
  .nav { background: var(--red); display: flex; justify-content: space-around; padding: 12px 0; flex-shrink: 0; }
  .nav-item { color: rgba(249,216,0,0.5); font-weight: 700; font-size: 11px; cursor: pointer; text-align: center; }
  .nav-item.active { color: var(--yellow); }
  .btn { width: 100%; border: none; border-radius: var(--radius-md); padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: 'Nunito'; }
  .btn-primary { background: var(--red); color: var(--yellow); }
  
  .cat-group { margin-bottom: 25px; }
  .cat-header { display: flex; justify-content: space-between; align-items: center; background: #f8f8f8; padding: 8px 12px; border-radius: 6px; border-left: 4px solid var(--red); margin-bottom: 10px; }
  .cat-title { font-size: 13px; font-weight: 800; color: var(--red); }
  
  .product-item { padding: 12px 0; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
  .order-controls { display: flex; gap: 5px; }
  .order-btn { background: #eee; border: none; border-radius: 4px; padding: 4px 8px; font-size: 10px; cursor: pointer; }

  .flavor-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; background: #fafafa; border-radius: 6px; margin-top: 5px; font-size: 13px; }
  .qty-btn { width: 28px; height: 28px; border-radius: 50%; border: none; background: #eee; font-weight: bold; cursor: pointer; }
  .qty-btn.plus { background: var(--red); color: white; }

  .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 8px 16px; border-radius: 20px; font-size: 12px; opacity: 0; transition: 0.3s; z-index: 999; }
  .toast.show { opacity: 1; }
</style>
</head>
<body onclick="window.closeAllMenus()">
<div class="app">

  <div class="screen active" id="screen-login">
    <div style="background: var(--red); padding: 50px 20px; text-align: center;"><h1 style="color:var(--yellow); font-family:'Nunito'; font-weight:900;">Salgados do Ponto.</h1></div>
    <div class="body">
      <div class="field"><label style="font-size:11px; font-weight:800; color:#666">NOME</label><input type="text" id="login-name" style="width:100%; padding:12px; border-radius:8px; border:1px solid #ddd; margin-bottom:15px;"></div>
      <div class="field"><label style="font-size:11px; font-weight:800; color:#666">DATA</label><input type="date" id="login-date" style="width:100%; padding:12px; border-radius:8px; border:1px solid #ddd; margin-bottom:15px;"></div>
      <button class="btn btn-primary" onclick="window.doLogin()">Entrar</button>
    </div>
  </div>

  <div class="screen" id="screen-order">
    <div class="header"><div id="order-info" style="font-weight:800;"></div></div>
    <div class="body">
      <div id="order-tabs" style="display:flex; gap:8px; overflow-x:auto; padding-bottom:12px;"></div>
      <div id="order-products"></div>
      <textarea id="order-obs" rows="2" placeholder="Observações do pedido..." style="width:100%; margin-top:15px; padding:10px; border-radius:8px; border:1px solid #ddd;"></textarea>
    </div>
    <div style="padding:15px;"><button class="btn btn-primary" onclick="window.navigate('review')">Revisar Pedido</button></div>
    <div class="nav"><div class="nav-item active" onclick="window.navigate('order')">PEDIDO</div><div class="nav-item" onclick="window.navigate('catalog')">PRODUTOS</div></div>
  </div>

  <div class="screen" id="screen-catalog">
    <div class="header" style="display:flex; justify-content:space-between; align-items:center;">
        <b>Organizar Catálogo</b>
        <button onclick="window.addCategory()" style="background:var(--yellow); border:none; padding:5px 10px; border-radius:5px; font-weight:800; font-size:10px;">+ CATEGORIA</button>
    </div>
    <div class="body">
      <div style="background:var(--yellow-light); padding:15px; border-radius:12px; margin-bottom:20px; border:1px solid var(--yellow);">
        <input type="text" id="new-name" placeholder="Nome do Produto" style="width:100%; padding:10px; margin-bottom:10px; border-radius:6px; border:1px solid #ddd;">
        <div style="display:flex; gap:10px; margin-bottom:10px;">
          <select id="new-cat" style="flex:1; padding:10px; border-radius:6px; border:1px solid #ddd;"></select>
          <select id="new-unit" style="flex:1; padding:10px; border-radius:6px; border:1px solid #ddd;"><option>unidade</option><option>caixa</option><option>fardo</option></select>
        </div>
        <button class="btn btn-primary" onclick="window.addProduct()">Adicionar Produto</button>
      </div>
      <div id="catalog-grouped"></div>
    </div>
    <div class="nav"><div class="nav-item" onclick="window.navigate('order')">PEDIDO</div><div class="nav-item active" onclick="window.navigate('catalog')">PRODUTOS</div></div>
  </div>

  <div class="screen" id="screen-review">
    <div class="header"><b>Resumo</b></div>
    <div class="body" id="review-body"></div>
    <div style="padding:15px; display:flex; gap:10px;"><button class="btn" style="background:#eee" onclick="window.navigate('order')">Voltar</button><button class="btn btn-primary" onclick="window.generateOrder()">Finalizar</button></div>
  </div>

  <div class="screen" id="screen-result">
    <div class="header"><b>Mensagem</b></div>
    <div class="body">
      <div id="result-message" style="background:#f4f4f4; padding:15px; border-radius:10px; white-space:pre-wrap; font-family:monospace; font-size:13px;"></div>
      <button class="btn btn-primary" style="margin-top:20px;" onclick="window.copyMessage()">Copiar WhatsApp</button>
      <button class="btn" style="background:#eee; margin-top:10px; width:100%" onclick="window.newOrder()">Novo Pedido</button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, setDoc, deleteDoc, onSnapshot, query, orderBy, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA-B0kT2YjodcNeIV6-T3QV17wQkDTYqu0",
  authDomain: "salgados-do-ponto-51c80.firebaseapp.com",
  projectId: "salgados-do-ponto-51c80",
  storageBucket: "salgados-do-ponto-51c80.firebasestorage.app",
  appId: "1:340460030406:web:d60b6d0bbb40acdce5cac7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let products = [], categories = [], quantities = {}, user = '', date = '', activeCat = '';

// --- FUNÇÕES DE LOGIN E NAVEGAÇÃO ---
window.doLogin = () => {
  user = document.getElementById('login-name').value;
  date = document.getElementById('login-date').value;
  if(!user || !date) return alert("Preencha os campos!");
  window.navigate('order');
};

window.navigate = (s) => {
  document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
  document.getElementById('screen-'+s).classList.add('active');
  if(s==='order') renderOrder();
  if(s==='catalog') renderCatalog();
  if(s==='review') renderReview();
};

// --- FUNÇÕES DO CATÁLOGO (CATEGORIAS E PRODUTOS) ---
window.addCategory = async () => {
    const n = prompt("Nome da nova categoria:");
    if(n) await addDoc(collection(db, "categories"), { name: n, order: categories.length });
};

window.addProduct = async () => {
    const name = document.getElementById('new-name').value;
    const cat = document.getElementById('new-cat').value;
    const unit = document.getElementById('new-unit').value;
    if(!name) return;
    const catProds = products.filter(p => p.cat === cat);
    await addDoc(collection(db, "products"), { name, cat, unit, order: catProds.length });
    document.getElementById('new-name').value = '';
    showToast("Produto Adicionado!");
};

window.deleteCategory = async (id, name) => {
    if(confirm(`Excluir categoria "${name}" e todos os seus produtos?`)) {
        await deleteDoc(doc(db, "categories", id));
        products.filter(p => p.cat === name).forEach(async (p) => {
            await deleteDoc(doc(db, "products", p.firebaseId));
        });
    }
};

window.deleteProduct = async (id) => {
    if(confirm("Excluir produto?")) await deleteDoc(doc(db, "products", id));
};

// --- FUNÇÕES DE REORDENAÇÃO ---
window.moveCat = async (index, direction) => {
    const newIndex = index + direction;
    if(newIndex < 0 || newIndex >= categories.length) return;
    const item1 = categories[index];
    const item2 = categories[newIndex];
    await updateDoc(doc(db, "categories", item1.firebaseId), { order: newIndex });
    await updateDoc(doc(db, "categories", item2.firebaseId), { order: index });
};

window.moveProd = async (prodId, direction, catName) => {
    const catProds = products.filter(p => p.cat === catName).sort((a,b) => a.order - b.order);
    const index = catProds.findIndex(p => p.firebaseId === prodId);
    const newIndex = index + direction;
    if(newIndex < 0 || newIndex >= catProds.length) return;
    const item1 = catProds[index];
    const item2 = catProds[newIndex];
    await updateDoc(doc(db, "products", item1.firebaseId), { order: item2.order });
    await updateDoc(doc(db, "products", item2.firebaseId), { order: item1.order });
};

// --- RENDERIZAÇÃO ---
function renderOrder() {
  document.getElementById('order-info').textContent = `${user} • ${date.split('-').reverse().join('/')}`;
  if(!activeCat && categories.length) activeCat = categories[0].name;
  document.getElementById('order-tabs').innerHTML = categories.map(c => `<button onclick="window.activeCat='${c.name}'; renderOrder()" style="padding:8px 15px; border-radius:20px; border:1px solid #ddd; background:${activeCat===c.name?'var(--red)':'#fff'}; color:${activeCat===c.name?'#fff':'#666'}; font-weight:700; white-space:nowrap; margin-right:5px;">${c.name}</button>`).join('');
  
  const cont = document.getElementById('order-products');
  cont.innerHTML = products.filter(p => p.cat === activeCat).sort((a,b) => a.order - b.order).map(p => `
    <div class="product-item">
      <div><b>${p.name}</b><br><small>${p.unit}</small></div>
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="qty-btn" onclick="window.chg('${p.firebaseId}',-1)">-</button>
        <b>${quantities[p.firebaseId]||0}</b>
        <button class="qty-btn plus" onclick="window.chg('${p.firebaseId}',1)">+</button>
      </div>
    </div>`).join('');
}

window.chg = (id, v) => {
    const n = (quantities[id] || 0) + v;
    if(n <= 0) delete quantities[id]; else quantities[id] = n;
    renderOrder();
};

function renderCatalog() {
    const cont = document.getElementById('catalog-grouped');
    const select = document.getElementById('new-cat');
    select.innerHTML = categories.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
    
    cont.innerHTML = categories.map((c, idx) => {
        const pList = products.filter(p => p.cat === c.name).sort((a,b) => a.order - b.order);
        return `
            <div class="cat-group">
                <div class="cat-header">
                    <span class="cat-title">${c.name}</span>
                    <div class="order-controls">
                        <button class="order-btn" onclick="window.moveCat(${idx}, -1)">▲</button>
                        <button class="order-btn" onclick="window.moveCat(${idx}, 1)">▼</button>
                        <button class="order-btn" style="color:red" onclick="window.deleteCategory('${c.firebaseId}','${c.name}')">🗑️</button>
                    </div>
                </div>
                ${pList.map((p, pIdx) => `
                    <div class="product-item" style="padding:8px 10px; font-size:13px">
                        <span>${p.name}</span>
                        <div class="order-controls">
                            <button class="order-btn" onclick="window.moveProd('${p.firebaseId}', -1, '${c.name}')">▲</button>
                            <button class="order-btn" onclick="window.moveProd('${p.firebaseId}', 1, '${c.name}')">▼</button>
                            <button class="order-btn" style="color:red" onclick="window.deleteProduct('${p.firebaseId}')">✕</button>
                        </div>
                    </div>`).join('')}
            </div>`;
    }).join('');
}

function renderReview() {
    let h = '';
    categories.forEach(c => {
        let catH = "";
        products.filter(p => p.cat === c.name).forEach(p => {
            if(quantities[p.firebaseId]) catH += `<div>${p.name}: <b>${quantities[p.firebaseId]} ${p.unit}</b></div>`;
        });
        if(catH) h += `<div style="margin-top:15px; border-bottom:1px solid #eee; padding-bottom:5px;"><b style="color:red">${c.name}</b>${catH}</div>`;
    });
    document.getElementById('review-body').innerHTML = h || 'Vazio';
}

window.generateOrder = () => {
  let msg = `*PEDIDO SALGADOS DO PONTO*\n👤 ${user}\n📅 ${date.split('-').reverse().join('/')}\n`;
  categories.forEach(c => {
      let ct = "";
      products.filter(p => p.cat === c.name).forEach(p => {
          if(quantities[p.firebaseId]) ct += `• ${p.name}: ${quantities[p.firebaseId]} ${p.unit}\n`;
      });
      if(ct) msg += `\n🔹 *${c.name}*\n${ct}`;
  });
  const obs = document.getElementById('order-obs').value;
  if(obs) msg += `\n📝 *OBS:* ${obs}`;
  document.getElementById('result-message').textContent = msg;
  window.navigate('result');
};

window.copyMessage = () => {
    navigator.clipboard.writeText(document.getElementById('result-message').textContent);
    showToast("Pedido Copiado!");
};

window.newOrder = () => { quantities = {}; document.getElementById('order-obs').value = ''; window.navigate('order'); };

function showToast(m) { const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }

// --- SINCRONIZAÇÃO COM FIREBASE ---
onSnapshot(query(collection(db
