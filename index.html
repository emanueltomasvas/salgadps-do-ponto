<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salgados do Ponto — Pedidos</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #C8191A; --red-dark: #a01415; --red-light: #f5e0e0;
    --yellow: #F9D800; --yellow-light: #fffbe0;
    --white: #ffffff; --gray-50: #fafafa; --gray-100: #f4f4f4;
    --gray-200: #e8e8e8; --gray-400: #aaa; --gray-600: #666;
    --gray-900: #1a1a1a; --radius-sm: 8px; --radius-md: 12px; --radius-lg: 18px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Nunito Sans', sans-serif; background: #ddd; min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; }
  .app { width: 100%; max-width: 480px; min-height: 100vh; background: var(--white); display: flex; flex-direction: column; position: relative; }
  @media (min-width: 480px) { body { padding: 20px 0; align-items: center; } .app { min-height: 95vh; border-radius: 24px; box-shadow: 0 8px 40px rgba(0,0,0,0.15); overflow: hidden; } }
  .screen { display: none; flex-direction: column; flex: 1; }
  .screen.active { display: flex; }
  .header { background: var(--red); padding: 18px 20px 16px; flex-shrink: 0; }
  .header-row { display: flex; justify-content: space-between; align-items: center; }
  .header-title { color: var(--yellow); font-family: 'Nunito', sans-serif; font-size: 18px; font-weight: 800; }
  .header-sub { color: rgba(249,216,0,0.6); font-size: 12px; margin-top: 3px; }
  .header-badge { background: var(--yellow); color: var(--red); border-radius: 20px; padding: 4px 12px; font-size: 12px; font-weight: 800; font-family: 'Nunito', sans-serif; }
  .body { flex: 1; overflow-y: auto; padding: 18px 16px 16px; }
  .nav { background: var(--red); display: flex; justify-content: space-around; padding: 10px 0 14px; flex-shrink: 0; }
  .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; padding: 0 14px; }
  .nav-icon { width: 26px; height: 26px; border-radius: 7px; background: rgba(249,216,0,0.2); display: flex; align-items: center; justify-content: center; }
  .nav-icon.active { background: var(--yellow); }
  .nav-icon svg { width: 13px; height: 13px; fill: rgba(249,216,0,0.5); }
  .nav-icon.active svg { fill: var(--red); }
  .nav-label { font-size: 10px; color: rgba(249,216,0,0.5); font-weight: 700; font-family: 'Nunito', sans-serif; }
  .nav-label.active { color: var(--yellow); }
  .btn { width: 100%; border: none; border-radius: var(--radius-md); padding: 14px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: 'Nunito', sans-serif; }
  .btn-primary { background: var(--red); color: var(--yellow); }
  .btn-secondary { background: var(--gray-100); color: var(--red); border: 1px solid var(--gray-200); }
  .btn-group { display: flex; gap: 10px; }
  .btn-group .btn { flex: 1; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 11px; font-weight: 800; color: var(--gray-600); margin-bottom: 6px; text-transform: uppercase; }
  .field input, .field select { width: 100%; border: 1.5px solid var(--gray-200); border-radius: var(--radius-sm); padding: 12px 14px; font-size: 14px; }
  .cat-tabs { display: flex; gap: 7px; overflow-x: auto; padding-bottom: 2px; }
  .cat-tab { background: var(--gray-100); border-radius: 20px; padding: 7px 14px; font-size: 12px; color: var(--gray-600); border: 1.5px solid var(--gray-200); cursor: pointer; font-weight: 700; }
  .cat-tab.active { background: var(--red); color: var(--yellow); border-color: var(--red); }
  .product-row { display: flex; align-items: center; justify-content: space-between; padding: 11px 0; border-bottom: 1px solid var(--gray-100); }
  .pname { font-size: 14px; color: var(--gray-900); font-weight: 600; }
  .punit { font-size: 11px; color: var(--gray-400); }
  .counter { display: flex; align-items: center; gap: 10px; }
  .cbtn { width: 30px; height: 30px; border-radius: 50%; background: var(--red); color: var(--yellow); border: none; font-weight: 800; cursor: pointer; }
  .cbtn.zero { background: var(--gray-200); color: var(--gray-400); }
  .cval { font-size: 15px; font-weight: 800; min-width: 22px; text-align: center; }
  .message-box { background: var(--gray-50); border-radius: var(--radius-md); padding: 16px; font-size: 13px; line-height: 1.8; font-family: monospace; white-space: pre-wrap; margin-bottom: 14px; border: 1px solid var(--gray-200); }
  .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: #fff; padding: 10px 20px; border-radius: 30px; font-size: 13px; opacity: 0; transition: 0.3s; z-index: 999; }
  .toast.show { opacity: 1; }
  .login-top { background: var(--red); padding: 52px 24px 36px; text-align: center; }
  .login-brand { color: var(--yellow); font-size: 30px; font-weight: 900; }
  .edit-modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:100; align-items:center; justify-content:center; }
  .edit-modal-overlay.open { display:flex; }
  .edit-modal { background:#fff; padding:20px; border-radius:20px; width:90%; max-width:400px; }
  .cad-row { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid #eee; }
  .cad-actions { display:flex; gap:10px; }
  .hist-card { background:#f9f9f9; padding:15px; border-radius:12px; margin-bottom:10px; border:1px solid #eee; }
  .hist-detail { display:none; margin-top:10px; border-top:1px solid #eee; padding-top:10px; }
  .hist-detail.open { display:block; }
</style>
</head>
<body>
<div class="app" id="app">

  <div class="screen active" id="screen-login">
    <div class="login-top">
      <div class="login-brand">Salgados<br>do Ponto.</div>
    </div>
    <div class="body">
      <div class="field"><label>Seu nome</label><input type="text" id="login-name" placeholder="Ex: Maria..."></div>
      <div class="field"><label>Data do pedido</label><input type="date" id="login-date"></div>
      <button class="btn btn-primary" onclick="doLogin()">Iniciar pedido</button>
    </div>
  </div>

  <div class="screen" id="screen-order">
    <div class="header"><div class="header-row"><div><div class="header-title">Pedido</div><div id="order-info" class="header-sub"></div></div><div class="header-badge" id="order-count">0 itens</div></div></div>
    <div class="body">
      <div class="cat-tabs" id="order-tabs"></div>
      <div id="order-products" style="margin-top:15px;"></div>
    </div>
    <div class="footer-sticky" style="padding:15px;"><button class="btn btn-primary" onclick="goToReview()">Revisar pedido</button></div>
    <div class="nav">
      <div class="nav-item" onclick="navigate('order')"><div class="nav-icon active"></div><span class="nav-label active">Pedido</span></div>
      <div class="nav-item" onclick="navigate('history')"><div class="nav-icon"></div><span class="nav-label">Histórico</span></div>
      <div class="nav-item" onclick="navigate('catalog')"><div class="nav-icon"></div><span class="nav-label">Produtos</span></div>
    </div>
  </div>

  <div class="screen" id="screen-review">
    <div class="header"><div class="header-title">Revisar</div></div>
    <div class="body" id="review-body"></div>
    <div class="footer-sticky" style="padding:15px;"><div class="btn-group"><button class="btn btn-secondary" onclick="navigate('order')">Editar</button><button class="btn btn-primary" onclick="generateOrder()">Gerar Mensagem</button></div></div>
  </div>

  <div class="screen" id="screen-result">
    <div class="header"><div class="header-title">Pronto!</div></div>
    <div class="body"><div class="message-box" id="result-message"></div><button class="btn btn-primary" onclick="copyMessage()">Copiar para WhatsApp</button><button class="btn btn-secondary" style="margin-top:10px;" onclick="newOrder()">Novo Pedido</button></div>
  </div>

  <div class="screen" id="screen-history">
    <div class="header"><div class="header-title">Histórico</div></div>
    <div class="body" id="history-body"></div>
    <div class="nav">
      <div class="nav-item" onclick="navigate('order')">Pedido</div>
      <div class="nav-item" onclick="navigate('history')">Histórico</div>
      <div class="nav-item" onclick="navigate('catalog')">Produtos</div>
    </div>
  </div>

  <div class="screen" id="screen-catalog">
    <div class="header"><div class="header-title">Produtos</div></div>
    <div class="body">
      <div style="background:#fffbe0; padding:15px; border-radius:12px; margin-bottom:20px;">
        <div class="field"><label>Nome</label><input type="text" id="new-name"></div>
        <div class="field"><label>Cat</label><select id="new-cat"><option>Bolos</option><option>Salgados</option><option>Bebidas</option><option>Sucos</option><option>Limpeza</option><option>Embalagens</option></select></div>
        <div class="field"><label>Un</label><select id="new-unit"><option>un</option><option>cx</option><option>fardo</option></select></div>
        <button class="btn btn-primary" onclick="addProduct()">Adicionar</button>
      </div>
      <div id="catalog-list"></div>
    </div>
    <div class="nav"><div class="nav-item" onclick="navigate('order')">Pedido</div><div class="nav-item" onclick="navigate('history')">Histórico</div><div class="nav-item" onclick="navigate('catalog')">Produtos</div></div>
  </div>

</div>

<div class="edit-modal-overlay" id="edit-overlay">
  <div class="edit-modal">
    <h3>Editar</h3>
    <div class="field"><input type="text" id="edit-name"></div>
    <div class="btn-group"><button class="btn btn-secondary" onclick="closeEdit()">Sair</button><button class="btn btn-primary" onclick="saveEdit()">Salvar</button></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script type="module">
// FIREBASE SETUP - Versão Estável 10.7.1
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, setDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA-B0kT2YjodcNeIV6-T3QV17wQkDTYqu0",
  authDomain: "salgados-do-ponto-51c80.firebaseapp.com",
  projectId: "salgados-do-ponto-51c80",
  storageBucket: "salgados-do-ponto-51c80.firebasestorage.app",
  appId: "1:340460030406:web:d60b6d0bbb40acdce5cac7"
};

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);

// VARIÁVEIS DE CONTROLE
let products = [], history = [], quantities = {};
let user = '', date = '', activeCat = 'Bolos', currentMsg = '', editingId = null;
const CATS = ['Bolos','Salgados','Bebidas','Sucos','Limpeza','Embalagens'];
const EMO = {Bolos:'🎂',Salgados:' dumpling',Bebidas:'🧃',Sucos:'🥤',Limpeza:'🧹',Embalagens:'📦'};

// EXPOR FUNÇÕES PARA O HTML (WINDOW)
window.doLogin = () => {
  const n = document.getElementById('login-name').value.trim();
  const d = document.getElementById('login-date').value;
  if(!n || !d) { showToast('Preencha nome e data'); return; }
  user = n; date = d; navigate('order');
};

window.navigate = (sc) => {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + sc).classList.add('active');
  if(sc === 'order') renderOrder();
  if(sc === 'history') renderHistory();
  if(sc === 'catalog') renderCatalog();
};

window.chg = (id, delta) => {
  const cur = quantities[id] || 0;
  const next = Math.max(0, cur + delta);
  if(next === 0) delete quantities[id]; else quantities[id] = next;
  updateCount(); renderProducts();
};

window.selCat = (c) => { activeCat = c; renderTabs(); renderProducts(); };

window.goToReview = () => {
  if(!Object.keys(quantities).length) return showToast('Selecione itens');
  renderReview(); navigate('review');
};

window.generateOrder = async () => {
  let msg = `*PEDIDO SALGADOS DO PONTO*\nData: ${fmtDate(date)}\nColaborador: ${user}\n`;
  for(const cat of CATS) {
    const items = products.filter(p => p.cat === cat && quantities[p.id]);
    if(!items.length) continue;
    msg += `\n${EMO[cat]} *${cat.toUpperCase()}*\n`;
    items.forEach(p => msg += `• ${p.name}: ${quantities[p.id]} ${p.unit}\n`);
  }
  currentMsg = msg;
  await addDoc(collection(db, 'history'), { user, date, msg, timestamp: Date.now(), quantities, itemsCount: Object.keys(quantities).length });
  document.getElementById('result-message').textContent = msg;
  navigate('result');
};

window.copyMessage = () => {
  navigator.clipboard.writeText(currentMsg);
  showToast('Copiado!');
};

window.newOrder = () => { quantities = {}; navigate('order'); };

window.addProduct = async () => {
  const name = document.getElementById('new-name').value;
  const cat = document.getElementById('new-cat').value;
  const unit = document.getElementById('new-unit').value;
  const p = { id: 'p' + Date.now(), name, cat, unit };
  await setDoc(doc(db, 'products', p.id), p);
  products.push(p); renderCatalog();
};

window.delProduct = async (id) => {
  if(!confirm('Apagar?')) return;
  await deleteDoc(doc(db, 'products', id));
  products = products.filter(x => x.id !== id);
  renderCatalog();
};

window.togDet = (i) => document.getElementById('hd'+i).classList.toggle('open');

// FUNÇÕES DE RENDERIZAÇÃO
function renderOrder() {
  document.getElementById('order-info').textContent = user + ' | ' + fmtDate(date);
  renderTabs(); renderProducts(); updateCount();
}

function renderTabs() {
  document.getElementById('order-tabs').innerHTML = CATS.map(c => 
    `<div class="cat-tab ${c===activeCat?'active':''}" onclick="selCat('${c}')">${c}</div>`
  ).join('');
}

function renderProducts() {
  const list = products.filter(p => p.cat === activeCat);
  document.getElementById('order-products').innerHTML = list.map(p => `
    <div class="product-row">
      <div><div class="pname">${p.name}</div><div class="punit">${p.unit}</div></div>
      <div class="counter">
        <button class="cbtn zero" onclick="chg('${p.id}',-1)">-</button>
        <span class="cval">${quantities[p.id] || 0}</span>
        <button class="cbtn" onclick="chg('${p.id}',1)">+</button>
      </div>
    </div>
  `).join('');
}

function updateCount() {
  const total = Object.values(quantities).reduce((a,b) => a+b, 0);
  document.getElementById('order-count').textContent = total + ' itens';
}

function renderReview() {
  let h = '';
  Object.keys(quantities).forEach(id => {
    const p = products.find(x => x.id === id);
    if(p) h += `<div style="padding:10px; border-bottom:1px solid #eee">${p.name}: <b>${quantities[id]} ${p.unit}</b></div>`;
  });
  document.getElementById('review-body').innerHTML = h;
}

async function renderHistory() {
  const snap = await getDocs(query(collection(db, 'history'), orderBy('timestamp', 'desc')));
  const hist = snap.docs.map(d => d.data());
  document.getElementById('history-body').innerHTML = hist.map((h, i) => `
    <div class="hist-card" onclick="togDet(${i})">
      <b>${h.user}</b> - ${fmtDate(h.date)} (${h.itemsCount} itens)
      <div class="hist-detail" id="hd${i}">${h.msg.replace(/\n/g, '<br>')}</div>
    </div>
  `).join('');
}

function renderCatalog() {
  document.getElementById('catalog-list').innerHTML = products.map(p => `
    <div class="cad-row">
      <div>${p.name} (${p.cat})</div>
      <button class="btn btn-secondary" style="width:auto; padding:5px 10px;" onclick="delProduct('${p.id}')">X</button>
    </div>
  `).join('');
}

function showToast(m) { const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }
function fmtDate(s) { if(!s) return ''; const [y,m,d] = s.split('-'); return `${d}/${m}/${y}`; }

// INIT
async function init() {
  const d = new Date();
  document.getElementById('login-date').value = d.toISOString().split('T')[0];
  const snap = await getDocs(collection(db, 'products'));
  products = snap.docs.map(d => d.data());
}
init();
</script>
</body>
</html>
